<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>opentui x xterm.js - web pong</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        background: #111;
        color: #ddd;
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      header {
        flex: none;
        padding: 10px 14px;
        background: #101826;
        border-bottom: 1px solid #223047;
        font-size: 12px;
        line-height: 1.4;
      }
      .header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .header-title {
        color: #e2e8f0;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .header-copy {
        margin-top: 4px;
        color: #94a3b8;
      }
      header code {
        background: #182235;
        padding: 1px 6px;
        border-radius: 3px;
        color: #9cdcfe;
      }
      #terminal {
        flex: 1;
        min-height: 0;
        padding: 8px;
        box-sizing: border-box;
      }
      .status {
        color: #888;
        margin-left: 12px;
      }
      .status.connected {
        color: #7ec699;
      }
      .status.closed {
        color: #e06c75;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-row">
        <div class="header-title">opentui web pong</div>
        <span class="status" id="status">connecting…</span>
      </div>
      <div class="header-copy">
        Shared match across tabs. <code>j/k</code> or arrows move, <code>space</code> serves or pauses, <code>r</code> resets, <code>q</code> quits.
      </div>
    </header>
    <div id="terminal"></div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script>
      const status = document.getElementById("status")
      const terminalElement = document.getElementById("terminal")
      const term = new Terminal({
        cursorBlink: false,
        fontFamily: "Menlo, Monaco, 'Courier New', monospace",
        theme: { background: "#000000" },
      })
      const fitAddon = new FitAddon.FitAddon()
      term.loadAddon(fitAddon)
      term.open(terminalElement)
      fitAddon.fit()
      term.focus()

      const wsUrl = (location.protocol === "https:" ? "wss:" : "ws:") + "//" + location.host + "/ws"
      const ws = new WebSocket(wsUrl)
      ws.binaryType = "arraybuffer"

      function focusTerminal() {
        term.focus()
      }

      function syncSize() {
        fitAddon.fit()
        if (ws.readyState !== WebSocket.OPEN) return
        if (term.cols <= 0 || term.rows <= 0) return
        ws.send(JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows }))
      }

      const resizeObserver = new ResizeObserver(() => syncSize())
      resizeObserver.observe(terminalElement)
      terminalElement.addEventListener("pointerdown", focusTerminal)

      window.addEventListener("resize", syncSize)
      window.addEventListener("pageshow", () => {
        focusTerminal()
        syncSize()
      })
      window.addEventListener("focus", () => {
        focusTerminal()
        syncSize()
      })
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          focusTerminal()
          syncSize()
        }
      })

      ws.addEventListener("open", () => {
        status.textContent = "connected"
        status.className = "status connected"
        focusTerminal()
        syncSize()
      })

      ws.addEventListener("message", (ev) => {
        // Binary frames are rendered ANSI output from the server.
        if (ev.data instanceof ArrayBuffer) {
          term.write(new Uint8Array(ev.data))
        }
      })

      ws.addEventListener("close", () => {
        status.textContent = "connection closed"
        status.className = "status closed"
      })

      ws.addEventListener("error", () => {
        status.textContent = "connection error"
        status.className = "status closed"
      })

      // Keyboard → server. xterm gives raw bytes, pass them through verbatim.
      term.onData((data) => {
        if (ws.readyState !== WebSocket.OPEN) return
        ws.send(new TextEncoder().encode(data))
      })
    </script>
  </body>
</html>
