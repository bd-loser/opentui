# ═════════════════════════════════════════════════════════════════
# XINCLI OpenTUI Fork — Publish JS Library Packages
#
# Builds @xincli/opentui-core and @xincli/opentui-react from source,
# repackages them with the @xincli/* name + Android native deps, and
# publishes to npm.
#
# Trigger:
#   - Push a tag matching `core-v*` or `react-v*` or `lib-v*`
#   - Manual dispatch (workflow_dispatch)
#
# Produces:
#   @xincli/opentui-core@<version>     (compiled JS, ~1.2 MB)
#   @xincli/opentui-react@<version>    (compiled JS, ~22 KB)
#
# Both packages work under Node.js 26.3+ with --experimental-ffi.
# No Bun required at runtime (only used at build time).
# ═════════════════════════════════════════════════════════════════

name: Publish JS Library

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.4.7)'
        required: true
        type: string
      publish:
        description: 'Publish to npm (false = dry run, just build + verify)'
        required: false
        default: true
        type: boolean
  push:
    tags:
      - 'lib-v*'
      - 'core-v*'
      - 'react-v*'

permissions:
  contents: read

jobs:
  publish:
    name: Build + Publish @xincli/opentui-{core,react}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '26.3'
          registry-url: 'https://registry.npmjs.org'

      - name: Install workspace dependencies
        run: bun install

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            # Strip prefix from tag: lib-v0.4.7 → 0.4.7
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#lib-v}"
            VERSION="${VERSION#core-v}"
            VERSION="${VERSION#react-v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Build @opentui/core library
        run: |
          cd packages/core
          bun scripts/build.ts --lib
          echo "=== dist/ contents ==="
          ls -lh dist/ | head -20
          echo "=== dist/package.json ==="
          cat dist/package.json

      - name: Build @opentui/react library
        run: |
          cd packages/react
          bun scripts/build.ts
          echo "=== dist/ contents ==="
          ls -lh dist/ | head -20
          echo "=== dist/package.json ==="
          cat dist/package.json

      - name: Repackage as @xincli/opentui-core
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          WORKSPACE="$PWD"
          STAGE_DIR="$(mktemp -d)"
          STAGE="$STAGE_DIR/package"
          mkdir -p "$STAGE"
          cp -r packages/core/dist/* "$STAGE/"

          # Rewrite package.json
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('$STAGE/package.json'));
            p.name = '@xincli/opentui-core';
            p.version = '$VERSION';
            p.description = 'XINCLI fork of OpenTUI core — with Android/Termux support via @xincli/opentui-core-android-*';
            p.repository = {
              type: 'git',
              url: 'git+https://github.com/bd-loser/opentui.git',
              directory: 'packages/core',
            };
            // Keep darwin/linux/win32 from upstream, skip @opentui/core-android-*
            // (those don't exist), keep @xincli/opentui-core-android-*
            const opts = {};
            for (const [k, v] of Object.entries(p.optionalDependencies || {})) {
              if (k.includes('darwin') || k.includes('linux') || k.includes('win32')) {
                opts[k] = v;
              } else if (k.startsWith('@xincli/opentui-core-android')) {
                opts[k] = '$VERSION';
              }
              // Skip @opentui/core-android-* (not published)
            }
            p.optionalDependencies = opts;
            fs.writeFileSync('$STAGE/package.json', JSON.stringify(p, null, 2));
            console.log('Repackaged as:', p.name, p.version);
            console.log('optionalDeps:', Object.keys(opts));
          "

          # Pack into workspace artifacts/ dir (use absolute path)
          mkdir -p "$WORKSPACE/artifacts"
          (cd "$STAGE_DIR" && npm pack ./package --pack-destination "$WORKSPACE/artifacts")
          ls -lh "$WORKSPACE/artifacts/"

      - name: Repackage as @xincli/opentui-react
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          WORKSPACE="$PWD"
          STAGE_DIR="$(mktemp -d)"
          STAGE="$STAGE_DIR/package"
          mkdir -p "$STAGE"
          cp -r packages/react/dist/* "$STAGE/"

          # Rewrite package.json
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('$STAGE/package.json'));
            p.name = '@xincli/opentui-react';
            p.version = '$VERSION';
            p.description = 'XINCLI fork of OpenTUI React binding — for use with @xincli/opentui-core';
            p.repository = {
              type: 'git',
              url: 'git+https://github.com/bd-loser/opentui.git',
              directory: 'packages/react',
            };
            // Alias @opentui/core → npm:@xincli/opentui-core
            if (p.dependencies && p.dependencies['@opentui/core']) {
              p.dependencies['@opentui/core'] = 'npm:@xincli/opentui-core@$VERSION';
            }
            fs.writeFileSync('$STAGE/package.json', JSON.stringify(p, null, 2));
            console.log('Repackaged as:', p.name, p.version);
            console.log('deps:', p.dependencies);
          "

          # Patch Node ESM compatibility: add .js to bare subpath imports
          # (Bun doesn't care, Node ESM requires explicit .js)
          # e.g. react-reconciler/constants → react-reconciler/constants.js
          find "$STAGE" -name '*.js' -type f | while read f; do
            sed -i -E 's|from "(react-reconciler)/([a-zA-Z0-9_/-]+)"|from "\1/\2.js"|g' "$f"
          done

          # Pack into workspace artifacts/ dir (use absolute path)
          (cd "$STAGE_DIR" && npm pack ./package --pack-destination "$WORKSPACE/artifacts")
          ls -lh "$WORKSPACE/artifacts/"

      - name: Verify packages resolve under Node
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          WORKSPACE="$PWD"
          TESTDIR="$(mktemp -d)"
          cd "$TESTDIR"
          # Write package.json via node to avoid heredoc indentation issues
          node -e "
            const fs = require('fs');
            const pkg = {
              name: 'verify',
              type: 'module',
              dependencies: {
                '@xincli/opentui-core': 'file:' + process.argv[1] + '/artifacts/xincli-opentui-core-' + process.argv[2] + '.tgz',
                '@xincli/opentui-react': 'file:' + process.argv[1] + '/artifacts/xincli-opentui-react-' + process.argv[2] + '.tgz',
                'react': '19.2.0',
                'react-reconciler': '0.33.0',
                'react-devtools-core': '7.0.1',
                'ws': '8.18.0',
              },
              overrides: {
                '@opentui/core': 'file:' + process.argv[1] + '/artifacts/xincli-opentui-core-' + process.argv[2] + '.tgz',
              },
            };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          " "$WORKSPACE" "$VERSION"

          npm install --legacy-peer-deps

          node --input-type=module -e "
            import('@xincli/opentui-core').then(m => {
              console.log('✅ @xincli/opentui-core resolves');
              console.log('  createCliRenderer:', typeof m.createCliRenderer);
              console.log('  RGBA:', typeof m.RGBA);
              console.log('  Box:', typeof m.Box);
              console.log('  Text:', typeof m.Text);
              console.log('  t:', typeof m.t);
            });
            import('@xincli/opentui-react').then(m => {
              console.log('✅ @xincli/opentui-react resolves');
              console.log('  createRoot:', typeof m.createRoot);
              console.log('  useKeyboard:', typeof m.useKeyboard);
              console.log('  useRenderer:', typeof m.useRenderer);
              console.log('  useTimeline:', typeof m.useTimeline);
            });
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xincli-opentui-packages
          path: artifacts/*.tgz
          retention-days: 90

      - name: Publish to npm
        if: github.event_name == 'workflow_dispatch' && inputs.publish || startsWith(github.ref, 'refs/tags/')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.XINCLI_NPM_SECRET }}
        run: |
          if [ -z "${{ secrets.XINCLI_NPM_SECRET }}" ]; then
            echo "⚠️  XINCLI_NPM_SECRET secret not set — skipping publish."
            echo "   Set it in repo Settings → Secrets and variables → Actions"
            echo "   as XINCLI_NPM_SECRET (an npm automation token)."
            exit 0
          fi

          VERSION="${{ steps.version.outputs.version }}"
          echo "Publishing @xincli/opentui-core@$VERSION..."
          npm publish artifacts/xincli-opentui-core-$VERSION.tgz --access public

          echo "Publishing @xincli/opentui-react@$VERSION..."
          npm publish artifacts/xincli-opentui-react-$VERSION.tgz --access public

          echo ""
          echo "✅ Published. Install with:"
          echo "   npm install @xincli/opentui-core@$VERSION @xincli/opentui-react@$VERSION \\"
          echo "     --legacy-peer-deps"
