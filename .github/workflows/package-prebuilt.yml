# ═════════════════════════════════════════════════════════════════
# XINCLI OpenTUI Fork — Package Prebuilt .so
#
# This workflow does NOT cross-compile. It only packages .so files
# that were built natively on Termux and committed to the repo.
#
# Flow:
#   1. You run build-native-termux.sh on your phone (produces .so)
#   2. You commit prebuilt/aarch64-android/libopentui.so
#   3. You push — this workflow fires
#   4. It runs package-prebuilt.ts to build the npm package dirs
#   5. It publishes them to npm (on main push or manual dispatch)
#
# Why this approach: cross-compiling from x86-linux to aarch64-android
# is genuinely hard (11 iterations proved it). Native builds on Termux
# skip ALL of it — no NDK, no sysroot, no libc file. The .so is linked
# against the exact Bionic libc that will load it.
# ═════════════════════════════════════════════════════════════════

name: Package Prebuilt Native

on:
  push:
    branches: [main]
    paths:
      - 'packages/core/prebuilt/**'
      - 'packages/core/scripts/package-prebuilt.ts'
      - '.github/workflows/package-prebuilt.yml'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm after packaging'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  package:
    name: Package prebuilt .so
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Verify prebuilt .so exists
        run: |
          set -e
          echo "Checking for prebuilt .so files..."
          if [ ! -d packages/core/prebuilt ]; then
            echo "❌ No prebuilt/ directory. Run build-native-termux.sh on a phone first."
            exit 1
          fi
          find packages/core/prebuilt -name "libopentui.so" -exec ls -lh {} \;
          if [ -z "$(find packages/core/prebuilt -name 'libopentui.so')" ]; then
            echo "❌ No libopentui.so found in prebuilt/. Build it first on Termux."
            exit 1
          fi
          echo "✓ Prebuilt .so found"

      - name: Verify .so is ARM64 ELF
        run: |
          for so in packages/core/prebuilt/*/libopentui.so; do
            echo "=== $so ==="
            file "$so"
            # Verify it's an ELF, not a stray macOS/Linux binary
            readelf -h "$so" | grep -E "Machine|Class" || true
          done

      - name: Package into npm dirs
        run: |
          cd packages/core
          bun run scripts/package-prebuilt.ts
          echo "=== dist-prebuilt contents ==="
          find dist-prebuilt -type f | head -20

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opentui-android-prebuilt
          path: packages/core/dist-prebuilt/
          retention-days: 90

      - name: Publish to npm
        if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.publish)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.XINCLI_NPM_TOKEN }}
        run: |
          if [ -z "${{ secrets.XINCLI_NPM_TOKEN }}" ]; then
            echo "⚠️  XINCLI_NPM_TOKEN secret not set — skipping publish."
            echo "   Set it in repo Settings → Secrets → Actions to enable npm publishing."
            exit 0
          fi

          cat << EOF > ~/.npmrc
          @xincli:registry=https://registry.npmjs.org
          //registry.npmjs.org/:_authToken=\${NODE_AUTH_TOKEN}
          EOF

          cd packages/core/dist-prebuilt
          for pkg in @xincli/opentui-core-android-*; do
            if [ -d "$pkg" ]; then
              echo "Publishing $pkg..."
              cd "$pkg"
              npm publish --access public || echo "⚠️  Publish failed for $pkg (may already exist)"
              cd ..
            fi
          done
